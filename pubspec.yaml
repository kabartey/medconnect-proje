name: med_connect
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

  dependencies:
    flutter:
        sdk: flutter
          flutter_localizations:
              sdk: flutter
                easy_localization: ^3.0.7
                  shared_preferences: ^2.2.2
                    uuid: ^4.3.3
                      intl: ^0.19.0

                      dev_dependencies:
                        flutter_test:
                            sdk: flutter
                              flutter_lints: ^3.0.1
                                flutter_launcher_icons: ^0.13.1

                                flutter_launcher_icons:
                                  android: "launcher_icon"
                                    ios: true
                                      image_path: "assets/images/icon.png"

                                      flutter:
                                        uses-material-design: true
                                          assets:
                                              - assets/translations/